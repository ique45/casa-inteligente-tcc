<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casa Inteligente — Dashboard</title>
  <link rel="stylesheet" href="css/app.css"/>
  <style>
    .status-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 24px;
    }
    .status-bar .label { color: var(--text-muted); font-size: 0.85rem; }
    .status-bar .last-seen { color: var(--text-muted); font-size: 0.78rem; margin-left: auto; }

    .devices-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 32px; }

    .btn-mic {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px; background: var(--bg-card2);
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
      color: var(--text); margin-bottom: 8px;
    }
    .btn-mic.listening { border-color: var(--purple); background: var(--purple-glow); color: var(--purple-light); }
    .mic-status { font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 32px; }

    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 8px;
    }
    .history-device { font-weight: 600; font-size: 0.9rem; min-width: 90px; }
    .history-trigger {
      font-size: 0.78rem; padding: 2px 8px; border-radius: 99px;
      background: var(--border); color: var(--text-muted);
    }
    .history-state { font-size: 0.85rem; }
    .history-state.on { color: var(--success); }
    .history-state.off { color: var(--danger); }
    .history-time { margin-left: auto; font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

    .empty-msg { color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 24px 0; }

    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      font-size: 0.85rem; color: var(--text-muted); cursor: pointer;
      padding: 6px 10px; border-radius: 6px; transition: all 0.15s;
    }
    .nav-link:hover { color: var(--purple-light); background: var(--purple-glow); }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="logo">Casa Inteligente</div>
    <div class="nav-links">
      <span class="nav-link" id="btn-automations">Automações</span>
      <span class="nav-link" id="btn-history-page">Histórico</span>
      <span class="nav-link" id="btn-profile">Perfil</span>
      <span class="nav-link" id="btn-logout">Sair</span>
    </div>
  </header>

  <div class="page-body">
    <div class="status-bar">
      <span class="label">Arduino</span>
      <span class="badge badge-offline" id="arduino-badge">Offline</span>
      <span class="last-seen" id="last-seen"></span>
    </div>

    <h2 class="section-title">Controles rápidos</h2>
    <div class="devices-grid" id="devices-grid">
      <div class="empty-msg">Carregando dispositivos…</div>
    </div>

    <div id="voice-section" style="display:none">
      <h2 class="section-title">Controle por voz</h2>
      <button class="btn-mic" id="btn-mic">🎤 Ativar voz</button>
      <span class="mic-status" id="mic-status">Clique para falar um comando</span>
    </div>

    <h2 class="section-title">Ativações recentes</h2>
    <div class="history-list" id="history-list">
      <div class="empty-msg">Nenhuma ativação ainda.</div>
    </div>
    <a onclick="window.location.href='history.html'" style="display:block;margin-top:12px;font-size:0.85rem;color:var(--purple-light);cursor:pointer;text-align:right">Ver histórico completo →</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
